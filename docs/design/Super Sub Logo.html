document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

00,255,0,.05),transparent 60%),#070708;padding:40px 32px 70px;\">\n  <div style=\"max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:34px;\">\n\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.09);padding-bottom:18px;\">\n      <div>\n        <div style=\"font:700 10px/1 'Archivo';letter-spacing:.24em;color:#c8ff00;\">PRODUCT MARK · IDENTITY SHEET<\u002Fdiv>\n        <div style=\"font-family:'Saira Condensed';font-weight:700;font-size:46px;line-height:.9;margin-top:8px;letter-spacing:.01em;\">SUPER SUB — THE MARK<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right;font:600 10px/1.7 'Archivo';letter-spacing:.1em;color:#71717a;\">SUBSTITUTION BOARD · ⇅ SUB ARROWS<br>ONE EVENODD PATH · SINGLE COLOR<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;\">\n      <sc-for list=\"{{ heroes }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div style=\"border-radius:16px;border:1px solid rgba(255,255,255,.09);overflow:hidden;background:#0c0c0f;\">\n          <div style=\"aspect-ratio:1;display:grid;place-items:center;background:{{ c.bg }};border-bottom:1px solid rgba(255,255,255,.06);\">\n            <svg width=\"240\" height=\"240\" sc-camel-view-box=\"0 0 100 100\"><path fill=\"{{ c.fg }}\" fill-rule=\"evenodd\" d=\"M26,12 H74 A18,18 0 0 1 92,30 V70 A18,18 0 0 1 74,88 H26 A18,18 0 0 1 8,70 V30 A18,18 0 0 1 26,12 Z M36,28 L47,46 L41,46 L41,72 L31,72 L31,46 L25,46 Z M64,72 L75,54 L69,54 L69,28 L59,28 L59,54 L53,54 Z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"padding:12px 14px;display:flex;align-items:center;justify-content:space-between;\">\n            <span style=\"font:700 10px/1 'Archivo';letter-spacing:.14em;color:#d4d4d8;\">{{ c.name }}<\u002Fspan>\n            <span style=\"font:600 9px/1 'Archivo';letter-spacing:.08em;color:#52525b;\">{{ c.hex }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font:700 10px/1 'Archivo';letter-spacing:.18em;color:#71717a;margin-bottom:14px;\">SIZE LADDER · JUDGED AT 512 / 64 / 32 / 16 PX<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ ladders }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:center;gap:22px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:{{ c.bg }};padding:18px 22px;\">\n            <span style=\"width:120px;flex:none;font:700 10px/1.5 'Archivo';letter-spacing:.12em;color:{{ c.label }};\">{{ c.name }}<\u002Fspan>\n            <div style=\"display:flex;align-items:center;gap:40px;flex:1;\">\n              <sc-for list=\"{{ sizes }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:9px;\">\n                  <div style=\"height:64px;display:flex;align-items:center;\">\n                    <svg width=\"{{ s.px }}\" height=\"{{ s.px }}\" sc-camel-view-box=\"0 0 100 100\"><path fill=\"{{ c.fg }}\" fill-rule=\"evenodd\" d=\"M26,12 H74 A18,18 0 0 1 92,30 V70 A18,18 0 0 1 74,88 H26 A18,18 0 0 1 8,70 V30 A18,18 0 0 1 26,12 Z M36,28 L47,46 L41,46 L41,72 L31,72 L31,46 L25,46 Z M64,72 L75,54 L69,54 L69,28 L59,28 L59,54 L53,54 Z\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fdiv>\n                  <span style=\"font:600 9px/1 'Archivo';letter-spacing:.1em;color:{{ c.sub }};\">{{ s.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"margin-left:auto;display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;background:rgba(255,255,255,.05);\">\n                <span style=\"font:600 9px/1 'Archivo';letter-spacing:.1em;color:{{ c.sub }};\">FAVICON<\u002Fspan>\n                <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 100 100\"><path fill=\"{{ c.fg }}\" fill-rule=\"evenodd\" d=\"M26,12 H74 A18,18 0 0 1 92,30 V70 A18,18 0 0 1 74,88 H26 A18,18 0 0 1 8,70 V30 A18,18 0 0 1 26,12 Z M36,28 L47,46 L41,46 L41,72 L31,72 L31,46 L25,46 Z M64,72 L75,54 L69,54 L69,28 L59,28 L59,54 L53,54 Z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font:700 10px/1 'Archivo';letter-spacing:.18em;color:#71717a;margin-bottom:14px;\">LOCKUP · README + VIDEO TITLE CARD<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:16px;\">\n        <div style=\"border-radius:16px;border:1px solid rgba(255,255,255,.09);background:#0b0b0d;display:flex;align-items:center;gap:22px;padding:38px 40px;\">\n          <svg width=\"96\" height=\"96\" sc-camel-view-box=\"0 0 100 100\"><path fill=\"#c8ff00\" fill-rule=\"evenodd\" d=\"M26,12 H74 A18,18 0 0 1 92,30 V70 A18,18 0 0 1 74,88 H26 A18,18 0 0 1 8,70 V30 A18,18 0 0 1 26,12 Z M36,28 L47,46 L41,46 L41,72 L31,72 L31,46 L25,46 Z M64,72 L75,54 L69,54 L69,28 L59,28 L59,54 L53,54 Z\"><\u002Fpath><\u002Fsvg>\n          <div style=\"height:74px;width:1px;background:rgba(255,255,255,.12);\"><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Saira Condensed';font-weight:700;font-size:56px;line-height:.82;letter-spacing:.005em;\">SUPER<br>SUB<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:16px;border:1px solid rgba(255,255,255,.09);background:#c8ff00;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:34px;\">\n          <svg width=\"70\" height=\"70\" sc-camel-view-box=\"0 0 100 100\"><path fill=\"#0b0b0d\" fill-rule=\"evenodd\" d=\"M26,12 H74 A18,18 0 0 1 92,30 V70 A18,18 0 0 1 74,88 H26 A18,18 0 0 1 8,70 V30 A18,18 0 0 1 26,12 Z M36,28 L47,46 L41,46 L41,72 L31,72 L31,46 L25,46 Z M64,72 L75,54 L69,54 L69,28 L59,28 L59,54 L53,54 Z\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-family:'Saira Condensed';font-weight:700;font-size:34px;line-height:.82;letter-spacing:.02em;color:#0b0b0d;text-align:center;\">SUPER SUB<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;margin-top:12px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#0c0c0f;padding:16px 20px;\">\n        <svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 100 100\"><path fill=\"#f4f4f5\" fill-rule=\"evenodd\" d=\"M26,12 H74 A18,18 0 0 1 92,30 V70 A18,18 0 0 1 74,88 H26 A18,18 0 0 1 8,70 V30 A18,18 0 0 1 26,12 Z M36,28 L47,46 L41,46 L41,72 L31,72 L31,46 L25,46 Z M64,72 L75,54 L69,54 L69,28 L59,28 L59,54 L53,54 Z\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-family:'Saira Condensed';font-weight:600;font-size:22px;letter-spacing:.16em;color:#f4f4f5;\">SUPER SUB<\u002Fspan>\n        <span style=\"margin-left:auto;font:600 9px/1 'Archivo';letter-spacing:.12em;color:#52525b;\">HORIZONTAL · MONO WHITE · IN-APP HEADER<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#0a0a0c;padding:18px 22px;\">\n      <div style=\"font:700 10px/1 'Archivo';letter-spacing:.18em;color:#c8ff00;margin-bottom:12px;\">GEOMETRY NOTES · FOR THE DEVELOPER<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px 40px;font-size:12px;line-height:1.5;color:#a1a1aa;\">\n        <div><b style=\"color:#d4d4d8;\">Construction.<\u002Fb> One <code style=\"color:#c8ff00;\">&lt;path&gt;<\u002Fcode>, <code style=\"color:#c8ff00;\">fill-rule:evenodd<\u002Fcode>. Board = rounded rect (r=18 on a 100 grid); the two arrows are reversed subpaths that knock through, so the surface behind shows in one color. No strokes, no gradients.<\u002Fdiv>\n        <div><b style=\"color:#d4d4d8;\">Colorways.<\u002Fb> Only <code style=\"color:#c8ff00;\">fill<\u002Fcode> + background change: volt on near-black, white on near-black, near-black on volt. Ship <code style=\"color:#c8ff00;\">favicon.svg<\u002Fcode> (self-contained black tile) &amp; <code style=\"color:#c8ff00;\">apple-touch-icon.svg<\u002Fcode> (40px safe margin).<\u002Fdiv>\n        <div><b style=\"color:#d4d4d8;\">Clear space.<\u002Fb> Keep the board's corner radius (≈18% of the mark) clear on all sides. Minimum size 16px — arrows stay legible because they're solid knockouts, not lines.<\u002Fdiv>\n        <div><b style=\"color:#d4d4d8;\">Lockup.<\u002Fb> Saira Condensed 700, mark height = cap height ×2, gap = one stroke width (hairline divider optional). Wordmark grayscale; the mark carries the volt.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1160,&quot;height&quot;:1200}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      heroes: [\n        { name: 'VOLT ON NEAR-BLACK', hex: '#c8ff00 / #0b0b0d', fg: '#c8ff00', bg: '#0b0b0d' },\n        { name: 'WHITE ON NEAR-BLACK', hex: '#f4f4f5 / #0b0b0d', fg: '#f4f4f5', bg: '#0b0b0d' },\n        { name: 'NEAR-BLACK ON VOLT', hex: '#0b0b0d / #c8ff00', fg: '#0b0b0d', bg: '#c8ff00' },\n      ],\n      ladders: [\n        { name: 'VOLT / BLACK', fg: '#c8ff00', bg: '#0b0b0d', label: '#c8ff00', sub: '#52525b' },\n        { name: 'WHITE / BLACK', fg: '#f4f4f5', bg: '#0b0b0d', label: '#d4d4d8', sub: '#52525b' },\n        { name: 'BLACK / VOLT', fg: '#0b0b0d', bg: '#c8ff00', label: '#0b0b0d', sub: '#3a4a00' },\n      ],\n      sizes: [\n        { px: 64, label: '512 → 64' },\n        { px: 32, label: '32' },\n        { px: 24, label: '24' },\n        { px: 16, label: '16' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
